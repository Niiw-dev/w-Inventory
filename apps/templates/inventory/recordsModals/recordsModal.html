<div class="modal fade" id="modalNuevoRegistro" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true" style="z-index:999999">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalLabel">Crear nuevo Registro</h5>
        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
          <div class="table-responsive">
            <table class="table align-items-center table-flush table-hover text-center" id="registrosDatatable"
                    style="margin-top: 15px;">
              <thead class="thead-light">
                <tr>
                  <th class="text-center text-dark h1" style="font-weight: 700; font-size: smaller">ID</th>
                  <th class="text-center text-dark h1" style="font-weight: 700; font-size: smaller">Insumo</th>
                  <th class="text-center text-dark h1" style="font-weight: 700; font-size: smaller">Cantidad Final</th>
                  <th class="text-center text-dark h1" style="font-weight: 700; font-size: smaller">Estado</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="item in insumos" :key="item.id">
                  <td>[[ item.id ]]</td>
                  <td>
                    <strong>[[ item.nombre ]]</strong>
                  </td>
                  <td>
                    <div class="btn-group justify-content-center">
                      <button :class="['btn btn-sm', item.cantidad<item.punto ? 'btn-danger' : 'btn-success']" @click="cambiarCantidad(item, -1)">-</button>
                      <input type="number" class="form-control text-center mx-1"
                           style="width: 70px;"
                           v-model="item.cantidad"
                           min="0">
                      <button :class="['btn btn-sm', item.cantidad<item.punto ? 'btn-danger' : 'btn-success']" @click="cambiarCantidad(item, 1)">+</button>
                    </div>
                  </td>
                  <td>
                    <span v-show="item.cantidad<item.punto" class="badge badge-danger ml-2 ls-1">CRÍTICO</span>
                    <span v-show="item.cantidad>=item.punto" class="badge badge-success ml-2 ls-1">OK</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" @click.prevent="enviarCierre" :disabled="cargando">
          <span v-if="cargando">
            <span class="d-none d-md-block"><i class="fas fa-spinner fa-spin"></i> Procesando...</span>
            <span class="d-md-none"><i class="fas fa-spinner fa-spin"></i></span>
          </span>
          <span v-else>
            <span class="d-none d-md-block"><i class="fas fa-save mr-2"></i >Guardar Cierre</span>
            <span class="d-md-none"><i class="fas fa-save"></i></span>
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
