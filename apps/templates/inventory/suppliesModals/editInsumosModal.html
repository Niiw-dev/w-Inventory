<div class="modal fade" id="editInsumoModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true" style="z-index:999999">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalLabel">Registrar Nueva Categoría</h5>
        <button type="button" class="btn-close" data-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre de la Categoría</label>
            <input type="text" v-model="insumos[idInsumoEdit].nombre" class="form-control" placeholder="Ej. Dulce" required>
          </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" @click.prevent="editarInsumo" :disabled="editandoInsumo">
          <span v-if="editandoInsumo"><i class="fas fa-spinner fa-spin"></i> Guardando...</span>
          <span v-else>Guardar Insumo</span>
        </button>
      </div>
    </div>
  </div>
</div>
